<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
</head>
<body>

    <h2>Enter OTP</h2>

    <form action="/verify-otp" method="POST">

        <input
            type="text"
            name="otp"
            placeholder="6-digit OTP"
            required
        >

        <button type="submit">
            Verify OTP
        </button>

    </form>

</body>
</html>
